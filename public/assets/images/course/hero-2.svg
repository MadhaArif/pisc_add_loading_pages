<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern Education Theme Background -->
  <defs>
    <linearGradient id="heroGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2a5298;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="whiteAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base Gradient -->
  <rect width="1920" height="1080" fill="url(#heroGrad2)"/>
  
  <!-- Large Decorative Circles -->
  <circle cx="1400" cy="300" r="250" fill="url(#whiteAccent)" filter="url(#glow2)"/>
  <circle cx="400" cy="700" r="180" fill="url(#whiteAccent)" opacity="0.15"/>
  
  <!-- Success/Achievement Elements -->
  <path d="M200 200 L250 150 L300 200 L250 250 Z" fill="#fbbf24" opacity="0.2" transform="rotate(15 250 200)"/>
  <circle cx="1700" cy="850" r="80" fill="#fbbf24" opacity="0.15"/>
  
  <!-- Wave Pattern -->
  <path d="M0 600 Q480 550 960 600 T1920 600" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.1"/>
  <path d="M0 650 Q480 600 960 650 T1920 650" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.08"/>
  <path d="M0 700 Q480 650 960 700 T1920 700" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.06"/>
  
  <!-- Dots Pattern -->
  <g fill="#ffffff" opacity="0.15">
    <circle cx="100" cy="100" r="3"/>
    <circle cx="200" cy="150" r="3"/>
    <circle cx="150" cy="250" r="3"/>
    <circle cx="1800" cy="200" r="3"/>
    <circle cx="1700" cy="300" r="3"/>
    <circle cx="1850" cy="350" r="3"/>
    <circle cx="300" cy="900" r="3"/>
    <circle cx="400" cy="950" r="3"/>
    <circle cx="350" cy="1000" r="3"/>
  </g>
  
  <!-- Light Beam -->
  <path d="M960 0 L1200 0 L960 400 Z" fill="url(#whiteAccent)" opacity="0.2"/>
</svg>
