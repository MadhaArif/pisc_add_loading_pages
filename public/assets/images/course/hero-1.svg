<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern Gradient Background for Hero Slider -->
  <defs>
    <linearGradient id="heroGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ab69d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base Gradient -->
  <rect width="1920" height="1080" fill="url(#heroGrad1)"/>
  
  <!-- Abstract Tech Pattern -->
  <circle cx="300" cy="200" r="150" fill="url(#accent1)" opacity="0.1" filter="url(#glow)"/>
  <circle cx="1600" cy="800" r="200" fill="url(#accent1)" opacity="0.15" filter="url(#glow)"/>
  <circle cx="900" cy="500" r="100" fill="url(#accent1)" opacity="0.08"/>
  
  <!-- Grid Lines -->
  <g opacity="0.05">
    <line x1="0" y1="200" x2="1920" y2="200" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1920" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="600" x2="1920" y2="600" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="800" x2="1920" y2="800" stroke="#ffffff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="1080" stroke="#ffffff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="1080" stroke="#ffffff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="1080" stroke="#ffffff" stroke-width="1"/>
    <line x1="1600" y1="0" x2="1600" y2="1080" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Floating Geometric Shapes -->
  <polygon points="100,100 150,50 200,100 150,150" fill="url(#accent1)" opacity="0.15" transform="rotate(45 150 100)"/>
  <rect x="1700" y="150" width="80" height="80" fill="url(#accent1)" opacity="0.1" transform="rotate(30 1740 190)"/>
  <circle cx="200" cy="900" r="60" fill="url(#accent1)" opacity="0.12"/>
  
  <!-- Light Rays -->
  <path d="M0 0 L400 0 L0 300 Z" fill="url(#accent1)" opacity="0.05"/>
  <path d="M1920 1080 L1500 1080 L1920 800 Z" fill="url(#accent1)" opacity="0.08"/>
</svg>
